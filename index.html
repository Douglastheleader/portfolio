<!DOCTYPE html>
<html lang="zh-HK" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>持倉快覽 PWA</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="持倉快覽">
<meta name="theme-color" content="#141311">
<link rel="manifest" href="data:application/json,{%22name%22:%22持倉快覽板%22,%22short_name%22:%22持倉%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230d0c0b%22,%22theme_color%22:%22%23141311%22,%22description%22:%22個人持倉即時快覽%22,%22orientation%22:%22portrait%22}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --bg:#f2f1ed;--surface:#faf9f6;--surface2:#edeae5;--border:rgba(40,37,29,.1);--divider:rgba(40,37,29,.06);
  --text:#1c1a16;--muted:#6e6d69;--faint:#b0afa9;
  --primary:#01696f;--primary-bg:rgba(1,105,111,.1);
  --green:#2e7d32;--green-bg:rgba(46,125,50,.1);
  --red:#c62828;--red-bg:rgba(198,40,40,.1);
  --gold:#9a7200;--gold-bg:rgba(154,114,0,.1);
  --blue:#1a5fa0;--blue-bg:rgba(26,95,160,.1);
  --shadow:0 1px 2px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --font:'Inter','Helvetica Neue',sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
  --bar-h:52px;
}
[data-theme="dark"]{
  --bg:#0d0c0b;--surface:#141311;--surface2:#1c1b18;--border:rgba(255,255,255,.07);--divider:rgba(255,255,255,.04);
  --text:#d6d4d0;--muted:#79786f;--faint:#444340;
  --primary:#4f98a3;--primary-bg:rgba(79,152,163,.1);
  --green:#5fa33a;--green-bg:rgba(95,163,58,.1);
  --red:#de6b73;--red-bg:rgba(222,107,115,.1);
  --gold:#d4a835;--gold-bg:rgba(212,168,53,.1);
  --blue:#5893cc;--blue-bg:rgba(88,147,204,.1);
  --shadow:0 1px 3px rgba(0,0,0,.4),0 4px 14px rgba(0,0,0,.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:none;scroll-behavior:smooth}
body{font-family:var(--font);font-size:14px;line-height:1.5;color:var(--text);background:var(--bg);min-height:100dvh}
button,input{font:inherit;color:inherit;border:none;background:none;cursor:pointer}

/* ── TICKER TAPE ── */
.tape-wrap{background:var(--surface);border-bottom:1px solid var(--border);overflow:hidden;height:34px;position:relative}
.tape-wrap::before,.tape-wrap::after{content:'';position:absolute;top:0;bottom:0;width:32px;z-index:2;pointer-events:none}
.tape-wrap::before{left:0;background:linear-gradient(to right,var(--surface),transparent)}
.tape-wrap::after{right:0;background:linear-gradient(to left,var(--surface),transparent)}
.tape-track{display:flex;gap:0;height:100%;align-items:center;animation:tape 40s linear infinite;white-space:nowrap;width:max-content}
.tape-track:hover{animation-play-state:paused}
@keyframes tape{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tape-item{display:flex;align-items:center;gap:8px;padding:0 20px;border-right:1px solid var(--divider);height:100%;font-size:12px}
.tape-sym{font-family:var(--mono);font-weight:700;letter-spacing:.01em}
.tape-price{font-family:var(--mono);font-weight:600}
.tape-chg{font-size:11px;font-weight:600}
.up{color:var(--green)}.dn{color:var(--red)}.fl{color:var(--muted)}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px 10px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:7px;font-weight:800;font-size:14px;letter-spacing:-.01em}
.logo svg{color:var(--primary)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;letter-spacing:.03em}
.pill-open{background:var(--green-bg);color:var(--green)}
.pill-closed{background:var(--red-bg);color:var(--red)}
.icon-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--surface2);color:var(--muted);transition:background .15s}
.icon-btn:active{background:var(--border)}
.refresh-ring{display:inline-block;transition:transform .4s}
.spinning{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.time-label{font-size:11px;color:var(--muted);font-family:var(--mono)}

/* ── SUMMARY ROW ── */
.sum-row{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surface);border-bottom:1px solid var(--border)}
.sum-cell{padding:10px 14px;border-right:1px solid var(--divider)}
.sum-cell:last-child{border-right:none}
.sum-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.sum-val{font-family:var(--mono);font-size:15px;font-weight:700;line-height:1}
.sum-sub{font-size:10px;margin-top:3px}

/* ── GRID LAYOUT ── */
.grid-root{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto;gap:1px;background:var(--divider);padding:1px;min-height:calc(100dvh - 148px)}

/* ── QUAD PANELS ── */
.quad{background:var(--bg);display:flex;flex-direction:column;overflow:hidden;min-height:0}
.quad-head{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:var(--surface);
  border-bottom:1px solid var(--border);
}
.quad-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:flex;align-items:center;gap:6px}
.quad-title span{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.quad-title .dot-price{background:var(--primary)}
.quad-title .dot-news{background:var(--gold)}
.quad-title .dot-rec{background:var(--green)}
.quad-title .dot-watch{background:var(--blue)}
.quad-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}

/* ── PRICE ITEMS ── */
.price-item{
  display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;
  padding:10px 12px;border-bottom:1px solid var(--divider);
  cursor:pointer;transition:background .1s;
}
.price-item:active{background:var(--surface2)}
.price-item:last-child{border-bottom:none}
.pi-sym{font-family:var(--mono);font-size:13px;font-weight:700;min-width:44px}
.pi-name{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-right{text-align:right}
.pi-price{font-family:var(--mono);font-size:14px;font-weight:700}
.pi-chg{font-size:10px;font-weight:600;margin-top:2px}
.pi-pnl-bar{height:3px;border-radius:999px;margin-top:4px;background:var(--border);overflow:hidden}
.pi-pnl-fill{height:100%;border-radius:999px;transition:width .5s ease}
.pi-pnl-val{font-size:10px;margin-top:2px;color:var(--muted)}

/* skeleton */
@keyframes sk{0%{background-position:-200% 0}100%{background-position:200% 0}}
.sk{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200%;animation:sk 1.3s ease-in-out infinite;border-radius:4px}
.sk-price{width:60px;height:14px}.sk-chg{width:40px;height:10px;margin-top:4px}

/* ── NEWS ITEMS ── */
.news-item{padding:10px 12px;border-bottom:1px solid var(--divider);cursor:pointer;transition:background .1s}
.news-item:active{background:var(--surface2)}
.news-item:last-child{border-bottom:none}
.ni-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.ni-tag{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--primary-bg);color:var(--primary)}
.ni-sent{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-left:auto}
.ni-title{font-size:12px;font-weight:600;line-height:1.45;color:var(--text)}
.ni-meta{font-size:10px;color:var(--muted);margin-top:3px}

/* ── REC ITEMS ── */
.rec-item{padding:10px 12px;border-bottom:1px solid var(--divider)}
.rec-item:last-child{border-bottom:none}
.ri-top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.ri-sym{font-family:var(--mono);font-size:13px;font-weight:700}
.ri-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;margin-left:auto}
.badge-buy{background:var(--green-bg);color:var(--green)}
.badge-hold{background:var(--gold-bg);color:var(--gold)}
.badge-watch{background:var(--blue-bg);color:var(--blue)}
.badge-sell{background:var(--red-bg);color:var(--red)}
.ri-row{display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap}
.ri-chip{font-size:10px;padding:3px 8px;border-radius:6px;background:var(--surface2);color:var(--muted);font-weight:600;white-space:nowrap}
.ri-chip.green{background:var(--green-bg);color:var(--green)}
.ri-chip.red{background:var(--red-bg);color:var(--red)}
.ri-chip.blue{background:var(--blue-bg);color:var(--blue)}
.ri-note{font-size:11px;color:var(--muted);line-height:1.5;border-top:1px solid var(--divider);padding-top:6px;margin-top:4px}

/* ── WATCH ITEMS ── */
.watch-item{padding:10px 12px;border-bottom:1px solid var(--divider)}
.watch-item:last-child{border-bottom:none}
.wi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.wi-sym{font-family:var(--mono);font-size:13px;font-weight:700}
.wi-name{font-size:10px;color:var(--muted)}
.wi-right{text-align:right}
.wi-price{font-family:var(--mono);font-size:13px;font-weight:700}
.wi-chg{font-size:10px;font-weight:600;margin-top:1px}
.wi-note{font-size:11px;color:var(--muted);line-height:1.4}

/* ── LIVE INDICATOR ── */
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── BOTTOM SAFE ── */
.safe-bottom{height:env(safe-area-inset-bottom,0)}
</style>
</head>
<body>

<!-- TICKER TAPE -->
<div class="tape-wrap">
  <div class="tape-track" id="tape-track">
    <!-- populated by JS (doubled for loop) -->
    <div class="tape-item"><span class="tape-sym">載入中</span><span class="tape-price" style="color:var(--muted)">—</span></div>
  </div>
</div>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">
    <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
      <rect x="1" y="7" width="4" height="14" rx="1" fill="currentColor" opacity="0.35"/>
      <rect x="7" y="11" width="4" height="10" rx="1" fill="currentColor" opacity="0.6"/>
      <rect x="13" y="4" width="4" height="17" rx="1" fill="currentColor"/>
      <circle cx="19.5" cy="3.5" r="2.5" fill="currentColor" opacity="0.75"/>
    </svg>
    快覽板
  </div>
  <div class="topbar-right">
    <span class="time-label"><span class="live-dot"></span><span id="clock">--:--</span></span>
    <span class="pill" id="mkt-pill">--</span>
    <button class="icon-btn" onclick="doRefresh()" aria-label="刷新">
      <svg id="refresh-icon" class="refresh-ring" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
    <button class="icon-btn" data-theme-toggle aria-label="主題">
      <svg id="theme-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<!-- SUMMARY ROW -->
<div class="sum-row">
  <div class="sum-cell">
    <div class="sum-label">總成本</div>
    <div class="sum-val" id="s-cost">—</div>
  </div>
  <div class="sum-cell">
    <div class="sum-label">總市值</div>
    <div class="sum-val" id="s-val">—</div>
  </div>
  <div class="sum-cell">
    <div class="sum-label">總盈虧</div>
    <div class="sum-val" id="s-pnl">—</div>
    <div class="sum-sub" id="s-pnl-pct" style="color:var(--muted)">—</div>
  </div>
  <div class="sum-cell">
    <div class="sum-label">今日波動</div>
    <div class="sum-val" id="s-day">—</div>
    <div class="sum-sub" id="s-day-sub" style="color:var(--muted)">—</div>
  </div>
</div>

<!-- 4-PANE GRID -->
<div class="grid-root">

  <!-- Q1: LIVE PRICES -->
  <div class="quad">
    <div class="quad-head">
      <div class="quad-title"><span class="dot-price"></span>即時價格</div>
    </div>
    <div class="quad-body" id="q-prices"></div>
  </div>

  <!-- Q2: NEWS -->
  <div class="quad">
    <div class="quad-head">
      <div class="quad-title"><span class="dot-news"></span>最新新聞</div>
    </div>
    <div class="quad-body" id="q-news"></div>
  </div>

  <!-- Q3: RECOMMENDATIONS -->
  <div class="quad">
    <div class="quad-head">
      <div class="quad-title"><span class="dot-rec"></span>操作建議</div>
    </div>
    <div class="quad-body" id="q-recs"></div>
  </div>

  <!-- Q4: WATCHLIST -->
  <div class="quad">
    <div class="quad-head">
      <div class="quad-title"><span class="dot-watch"></span>留意名單</div>
    </div>
    <div class="quad-body" id="q-watch"></div>
  </div>

</div>
<div class="safe-bottom"></div>

<script>
// ─── DATA ───
const HOLDINGS = [
  { ticker:'ORCL', name:'Oracle',       shares:13,     cost:231.27 },
  { ticker:'RDDT', name:'Reddit',        shares:3,      cost:177.50 },
  { ticker:'VOO',  name:'S&P500 ETF',    shares:3.8082, cost:663.37 },
  { ticker:'VT',   name:'World ETF',     shares:7.9113, cost:151.68 },
  { ticker:'AAPL', name:'Apple',         shares:4.0112, cost:291.93 },
  { ticker:'NVDA', name:'NVIDIA',        shares:7,      cost:226.80 },
  { ticker:'ADM',  name:'Archer-Daniels',shares:8,      cost:76.29  },
];
const WATCH = [
  { ticker:'META',  name:'Meta Platforms' },
  { ticker:'MSFT',  name:'Microsoft' },
  { ticker:'GEV',   name:'GE Vernova' },
  { ticker:'AMZN',  name:'Amazon' },
  { ticker:'TSM',   name:'TSMC ADR' },
];
const STRATS = {
  ORCL:{ rec:'hold', trigger:'$240+', stop:'$215', note:'雲端業務穩健增長，AI Oracle DB受惠，等反彈再判斷方向。' },
  RDDT:{ rec:'hold', trigger:'$160-165', stop:'$150', note:'用戶增長強勁，廣告收入加速，估值偏高宜小注持有。' },
  VOO: { rec:'buy',  trigger:'$650', stop:'$610', note:'標普500核心底倉，回調即加，長線首選。' },
  VT:  { rec:'hold', trigger:'$148', stop:'$138', note:'全球分散配置，降低美股集中風險，保留。' },
  AAPL:{ rec:'buy',  trigger:'$280-288', stop:'$270', note:'Apple Intelligence需求強勁，回調屬加碼機會。' },
  NVDA:{ rec:'watch',trigger:'$195-200', stop:'$185', note:'AI算力龍頭，估值仍高，分批建倉為宜。' },
  ADM: { rec:'hold', trigger:'$72-74',   stop:'$68',  note:'農業龍頭，受惠糧食供應鏈，回調至$72可分批加。' },
};
const WATCH_NOTES = {
  META: '廣告+AI雙主線，MAU突破40億，可趁回調介入',
  MSFT: 'Azure+Copilot企業AI整合領先，長線增長穩健',
  GEV:  'YTD +47%，電網基建核心受惠者，高增長高波動',
  AMZN: 'AWS重奪市佔，廣告高速成長，估值趨合理',
  TSM:  '5nm/3nm需求飽和，AI CoWoS供不應求，留意地緣',
};
// News loaded dynamically via RSS
const NEWS = [];

let cache = {};

// ─── THEME ───
const root = document.documentElement;
let dark = true;
root.setAttribute('data-theme','dark');
document.querySelector('[data-theme-toggle]').addEventListener('click', () => {
  dark = !dark;
  root.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('theme-icon').innerHTML = dark
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
});

// ─── CLOCK + MARKET ───
function clock() {
  const hkt = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Hong_Kong' }));
  const et  = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
  document.getElementById('clock').textContent =
    hkt.toLocaleTimeString('zh-HK', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const d = et.getDay(), m = et.getHours()*60+et.getMinutes();
  const open = d>=1&&d<=5&&m>=570&&m<960;
  const pill = document.getElementById('mkt-pill');
  pill.textContent = open ? '開市中' : '休市';
  pill.className = 'pill ' + (open ? 'pill-open' : 'pill-closed');
}
setInterval(clock, 1000); clock();

// ─── FETCH ───
async function fetchPrice(t) {
  const PROXY = 'https://corsproxy.io/?';
  const API = `https://query1.finance.yahoo.com/v8/finance/chart/${t}?interval=1d&range=2d`;
  try {
    const r = await fetch(PROXY + encodeURIComponent(API));
    const j = await r.json();
    const m = j.chart.result[0].meta;
    const p = m.regularMarketPrice || m.previousClose;
    const prev = m.previousClose || p;
    return { p, ch: p-prev, pct: ((p-prev)/prev)*100 };
  } catch { return null; }
}

async function fetchAll() {
  const tickers = [...HOLDINGS.map(h=>h.ticker), ...WATCH.map(w=>w.ticker)];
  const unique = [...new Set(tickers)];
  const results = await Promise.all(unique.map(t => fetchPrice(t).then(r => [t, r])));
  results.forEach(([t, r]) => { if (r) cache[t] = r; });
}

// ─── RENDER PRICES ───
function renderPrices() {
  document.getElementById('q-prices').innerHTML = HOLDINGS.map(h => {
    const d = cache[h.ticker];
    const cost = h.shares * h.cost;
    if (!d) return `<div class="price-item">
      <div><div class="pi-sym">${h.ticker}</div><div class="pi-name">${h.name}</div></div>
      <div style="font-size:10px;color:var(--muted)">${h.shares} @ $${h.cost.toFixed(2)}</div>
      <div class="pi-right"><div class="sk sk-price"></div><div class="sk sk-chg" style="margin-top:5px"></div></div>
    </div>`;
    const val = h.shares * d.p;
    const pnl = val - cost;
    const pct = (pnl / cost) * 100;
    const cls = d.ch >= 0 ? 'up' : 'dn';
    const pCls = pnl >= 0 ? 'up' : 'dn';
    const barW = Math.min(Math.abs(pct) * 4, 100);
    const barColor = pnl >= 0 ? 'var(--green)' : 'var(--red)';
    return `<div class="price-item">
      <div><div class="pi-sym">${h.ticker}</div><div class="pi-name">${h.name}</div></div>
      <div style="font-size:10px;color:var(--muted)">${h.shares}股</div>
      <div class="pi-right">
        <div class="pi-price">$${d.p.toFixed(2)}</div>
        <div class="pi-chg ${cls}">${d.ch>=0?'▲':'▼'}${Math.abs(d.pct).toFixed(2)}%</div>
        <div class="pi-pnl-bar"><div class="pi-pnl-fill" style="width:${barW}%;background:${barColor}"></div></div>
        <div class="pi-pnl-val ${pCls}">${pnl>=0?'+':''}$${pnl.toFixed(0)} (${pct>=0?'+':''}${pct.toFixed(1)}%)</div>
      </div>
    </div>`;
  }).join('');
}

// ─── RENDER SUMMARY ───
function renderSummary() {
  let totalCost=0, totalVal=0, totalDay=0, count=0;
  HOLDINGS.forEach(h => {
    const d = cache[h.ticker];
    totalCost += h.shares * h.cost;
    if (d) { totalVal += h.shares * d.p; totalDay += h.shares * d.ch; count++; }
  });
  document.getElementById('s-cost').textContent = '$'+fmt(totalCost);
  if (count > 0) {
    const pnl = totalVal - totalCost;
    const pct = (pnl / totalCost) * 100;
    document.getElementById('s-val').textContent = '$'+fmt(totalVal);
    const pnlEl = document.getElementById('s-pnl');
    pnlEl.textContent = (pnl>=0?'+$':'-$') + fmt(Math.abs(pnl));
    pnlEl.style.color = pnl>=0?'var(--green)':'var(--red)';
    const pctEl = document.getElementById('s-pnl-pct');
    pctEl.textContent = (pct>=0?'+':'')+pct.toFixed(2)+'%';
    pctEl.style.color = pct>=0?'var(--green)':'var(--red)';
    const dayEl = document.getElementById('s-day');
    dayEl.textContent = (totalDay>=0?'+$':'-$')+fmt(Math.abs(totalDay));
    dayEl.style.color = totalDay>=0?'var(--green)':'var(--red)';
    document.getElementById('s-day-sub').textContent = '今日倉位波動';
  }
}
function fmt(n) { return n >= 1000 ? (n/1000).toFixed(2)+'K' : n.toFixed(0); }

// ─── RENDER NEWS (RSS) ───
function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 3600) return Math.floor(diff/60) + '分鐘前';
  if (diff < 86400) return Math.floor(diff/3600) + '小時前';
  return Math.floor(diff/86400) + '天前';
}

function sentimentGuess(title) {
  const pos = /surge|jump|beat|growth|record|strong|rise|gain|up|high|buy|upgrade|profit|revenue|exceed/i;
  const neg = /fall|drop|miss|decline|loss|cut|down|warn|risk|sell|downgrade|concern|below|weak/i;
  if (pos.test(title)) return 'pos';
  if (neg.test(title)) return 'neg';
  return 'neu';
}

async function fetchRSSNews(ticker) {
  const PROXY = 'https://corsproxy.io/?';
  const url = `https://news.google.com/rss/search?q=${ticker}+stock&hl=en-US&gl=US&ceid=US:en`;
  try {
    const res = await fetch(PROXY + encodeURIComponent(url));
    const txt = await res.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(txt, 'text/xml');
    const items = Array.from(xml.querySelectorAll('item')).slice(0, 2);
    return items.map(item => ({
      ticker,
      title: item.querySelector('title')?.textContent?.replace(/\s*-\s*[^-]*$/, '') || '',
      time: timeAgo(item.querySelector('pubDate')?.textContent || ''),
      s: sentimentGuess(item.querySelector('title')?.textContent || '')
    }));
  } catch { return []; }
}

async function loadAndRenderNews() {
  const el = document.getElementById('q-news');
  el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">載入新聞中…</div>';
  const allTickers = [...HOLDINGS.map(h=>h.ticker), ...WATCH.map(w=>w.ticker)];
  const results = await Promise.all(allTickers.map(t => fetchRSSNews(t)));
  const allNews = results.flat().filter(n => n.title);
  if (allNews.length === 0) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">暫時無法載入新聞，請稍後再試</div>';
    return;
  }
  el.innerHTML = allNews.map(n => {
    const dotC = n.s==='pos'?'var(--green)':n.s==='neg'?'var(--red)':'var(--gold)';
    return `<div class="news-item">
      <div class="ni-top">
        <span class="ni-tag">${n.ticker}</span>
        <span class="ni-sent" style="background:${dotC}"></span>
      </div>
      <div class="ni-title">${n.title}</div>
      <div class="ni-meta">${n.time}</div>
    </div>`;
  }).join('');
}

function renderNews() { loadAndRenderNews(); }

// ─── RENDER RECS ───
function renderRecs() {
  document.getElementById('q-recs').innerHTML = HOLDINGS.map(h => {
    const s = STRATS[h.ticker] || { rec:'hold', trigger:'—', stop:'—', note:'—' };
    const bC = {buy:'badge-buy', hold:'badge-hold', watch:'badge-watch', sell:'badge-sell'}[s.rec]||'badge-hold';
    const bL = {buy:'加碼', hold:'持有', watch:'觀察', sell:'減持'}[s.rec]||'持有';
    const d = cache[h.ticker];
    const pnl = d ? (h.shares*(d.p - h.cost)) : null;
    const pnlChip = pnl !== null
      ? `<span class="ri-chip ${pnl>=0?'green':'red'}">${pnl>=0?'+':''} $${Math.abs(pnl).toFixed(0)}</span>`
      : '';
    return `<div class="rec-item">
      <div class="ri-top">
        <div class="ri-sym">${h.ticker}</div>
        ${pnlChip}
        <span class="ri-badge ${bC}">${bL}</span>
      </div>
      <div class="ri-row">
        <span class="ri-chip blue">加碼: ${s.trigger}</span>
        <span class="ri-chip red">止蝕: ${s.stop}</span>
      </div>
      <div class="ri-note">${s.note}</div>
    </div>`;
  }).join('');
}

// ─── RENDER WATCHLIST ───
function renderWatch() {
  document.getElementById('q-watch').innerHTML = WATCH.map(w => {
    const d = cache[w.ticker];
    const priceHtml = d
      ? `<div class="wi-price">$${d.p.toFixed(2)}</div>
         <div class="wi-chg ${d.ch>=0?'up':'dn'}">${d.ch>=0?'▲':'▼'}${Math.abs(d.pct).toFixed(2)}%</div>`
      : `<div class="wi-price sk" style="width:55px;height:14px"></div>`;
    return `<div class="watch-item">
      <div class="wi-top">
        <div><div class="wi-sym">${w.ticker}</div><div class="wi-name">${w.name}</div></div>
        <div class="wi-right">${priceHtml}</div>
      </div>
      <div class="wi-note">${WATCH_NOTES[w.ticker]||'—'}</div>
    </div>`;
  }).join('');
}

// ─── TICKER TAPE ───
function renderTape() {
  const all = [...HOLDINGS, ...WATCH.map(w=>({ticker:w.ticker,name:w.name,shares:0,cost:0}))];
  const items = all.map(h => {
    const d = cache[h.ticker];
    if (!d) return `<div class="tape-item"><span class="tape-sym">${h.ticker}</span><span class="tape-price" style="color:var(--muted)">—</span></div>`;
    const cls = d.ch>=0?'up':'dn';
    return `<div class="tape-item">
      <span class="tape-sym">${h.ticker}</span>
      <span class="tape-price">$${d.p.toFixed(2)}</span>
      <span class="tape-chg ${cls}">${d.ch>=0?'▲':'▼'}${Math.abs(d.pct).toFixed(2)}%</span>
    </div>`;
  }).join('');
  // double for seamless loop
  document.getElementById('tape-track').innerHTML = items + items;
}

// ─── REFRESH ───
async function doRefresh() {
  const icon = document.getElementById('refresh-icon');
  icon.classList.add('spinning');
  renderPrices(); // show skeletons
  await fetchAll();
  renderPrices();
  renderRecs();
  renderWatch();
  renderSummary();
  renderTape();
  icon.classList.remove('spinning');
}

// ─── INIT ───
renderNews();
renderRecs();
renderWatch();
renderPrices();
doRefresh();
setInterval(doRefresh, 60000);
// Refresh news every 10 minutes
setInterval(renderNews, 600000);
</script>

<script>
// ── SERVICE WORKER ──
const SW_CODE = `
const CACHE = 'portfolio-v1';
const ASSETS = [location.pathname];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  const url = new URL(e.request.url);
  // Network-first for price APIs, cache-first for everything else
  if (url.hostname.includes('yahoo') || url.hostname.includes('finance')) {
    e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
  } else {
    e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
      if (res && res.status === 200 && e.request.method === 'GET') {
        const clone = res.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
      }
      return res;
    })));
  }
});
`;

if ('serviceWorker' in navigator) {
  const blob = new Blob([SW_CODE], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, { scope: location.pathname })
    .then(reg => { console.log('[PWA] SW registered', reg.scope); })
    .catch(err => console.warn('[PWA] SW failed:', err));
}

// ── INSTALL PROMPT ──
let deferredPrompt = null;
const banner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');
const dismissBtn = document.getElementById('install-dismiss');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  banner.style.display = 'flex';
  document.body.style.paddingBottom = '80px';
});

installBtn && installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  console.log('[PWA] install outcome:', outcome);
  deferredPrompt = null;
  banner.style.display = 'none';
  document.body.style.paddingBottom = '';
});

dismissBtn && dismissBtn.addEventListener('click', () => {
  banner.style.display = 'none';
  document.body.style.paddingBottom = '';
});

window.addEventListener('appinstalled', () => {
  banner.style.display = 'none';
  console.log('[PWA] installed!');
});
</script>
