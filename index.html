<!DOCTYPE html>
<html lang="zh-HK" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="持倉快覽">
<meta name="theme-color" content="#141311">
<title>持倉快覽 PWA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --bg:#f2f1ed;--surface:#faf9f6;--surface2:#edeae5;--border:rgba(40,37,29,.1);--divider:rgba(40,37,29,.06);
  --text:#1c1a16;--muted:#6e6d69;--faint:#b0afa9;
  --primary:#01696f;--primary-bg:rgba(1,105,111,.1);
  --green:#2e7d32;--green-bg:rgba(46,125,50,.1);
  --red:#c62828;--red-bg:rgba(198,40,40,.1);
  --gold:#9a7200;--gold-bg:rgba(154,114,0,.1);
  --blue:#1a5fa0;--blue-bg:rgba(26,95,160,.1);
  --shadow:0 1px 2px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --font:"Inter","Helvetica Neue",sans-serif;
  --mono:"JetBrains Mono","Fira Code",monospace;
}
[data-theme="dark"]{
  --bg:#0d0c0b;--surface:#141311;--surface2:#1c1b18;--border:rgba(255,255,255,.07);--divider:rgba(255,255,255,.04);
  --text:#d6d4d0;--muted:#79786f;--faint:#444340;
  --primary:#4f98a3;--primary-bg:rgba(79,152,163,.1);
  --green:#5fa33a;--green-bg:rgba(95,163,58,.1);
  --red:#de6b73;--red-bg:rgba(222,107,115,.1);
  --gold:#d4a835;--gold-bg:rgba(212,168,53,.1);
  --blue:#5893cc;--blue-bg:rgba(88,147,204,.1);
  --shadow:0 1px 3px rgba(0,0,0,.4),0 4px 14px rgba(0,0,0,.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:none;scroll-behavior:smooth}
body{font-family:var(--font);font-size:14px;line-height:1.5;color:var(--text);background:var(--bg);min-height:100dvh;overflow-x:hidden}
button,input,textarea{font:inherit;color:inherit;border:none;background:none;cursor:pointer}
input,textarea{-webkit-appearance:none;appearance:none}

/* TAPE */
.tape-wrap{background:var(--surface);border-bottom:1px solid var(--border);overflow:hidden;height:32px;position:relative;flex-shrink:0}
.tape-wrap::before,.tape-wrap::after{content:"";position:absolute;top:0;bottom:0;width:28px;z-index:2;pointer-events:none}
.tape-wrap::before{left:0;background:linear-gradient(to right,var(--surface),transparent)}
.tape-wrap::after{right:0;background:linear-gradient(to left,var(--surface),transparent)}
.tape-track{display:flex;height:100%;align-items:center;animation:tape 50s linear infinite;white-space:nowrap;width:max-content}
.tape-track:hover{animation-play-state:paused}
@keyframes tape{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tape-item{display:flex;align-items:center;gap:7px;padding:0 18px;border-right:1px solid var(--divider);height:100%;font-size:11px;cursor:default}
.tape-sym{font-family:var(--mono);font-weight:700}
.tape-price{font-family:var(--mono);font-weight:600}
.tape-chg{font-size:10px;font-weight:600}
.up{color:var(--green)}.dn{color:var(--red)}.fl{color:var(--muted)}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;box-shadow:var(--shadow);flex-shrink:0}
.logo{display:flex;align-items:center;gap:7px;font-weight:800;font-size:14px;letter-spacing:-.01em;flex-shrink:0}
.logo svg{color:var(--primary)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:7px;flex-wrap:nowrap}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;letter-spacing:.03em;white-space:nowrap}
.pill-open{background:var(--green-bg);color:var(--green)}
.pill-closed{background:var(--red-bg);color:var(--red)}
.icon-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--surface2);color:var(--muted);flex-shrink:0}
.icon-btn:active{opacity:.7}
.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.time-lbl{font-size:11px;color:var(--muted);font-family:var(--mono);white-space:nowrap}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;margin-right:3px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* SUMMARY */
.sum-row{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.sum-cell{padding:8px 12px;border-right:1px solid var(--divider)}
.sum-cell:last-child{border-right:none}
.sum-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.sum-val{font-family:var(--mono);font-size:14px;font-weight:700;line-height:1}
.sum-sub{font-size:10px;margin-top:2px;color:var(--muted)}

/* TAB BAR */
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:10px 16px;font-size:11px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:.02em;transition:color .15s,border-color .15s}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}

/* PAGES */
.page{display:none;padding:10px;overflow-y:auto;flex:1}
.page.active{display:block}

/* PRICE CARDS */
.price-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(160px,100%),1fr));gap:8px;margin-bottom:10px}
.p-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;box-shadow:var(--shadow);cursor:pointer;transition:background .1s}
.p-card:active{background:var(--surface2)}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.pc-sym{font-family:var(--mono);font-size:14px;font-weight:700}
.pc-name{font-size:10px;color:var(--muted);margin-top:1px}
.pc-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px}
.badge-buy{background:var(--green-bg);color:var(--green)}
.badge-hold{background:var(--gold-bg);color:var(--gold)}
.badge-watch{background:var(--blue-bg);color:var(--blue)}
.pc-price{font-family:var(--mono);font-size:18px;font-weight:700;line-height:1;margin-bottom:3px}
.pc-chg{font-size:11px;font-weight:600;margin-bottom:8px}
.pc-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.pc-stat{background:var(--surface2);border-radius:6px;padding:5px 7px}
.pc-stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.pc-stat-val{font-family:var(--mono);font-size:11px;font-weight:600;margin-top:1px}
.pnl-bar{height:3px;border-radius:999px;background:var(--border);margin-top:6px;overflow:hidden}
.pnl-fill{height:100%;border-radius:999px;transition:width .6s ease}

/* SKELETON */
@keyframes sk{0%{background-position:-200% 0}100%{background-position:200% 0}}
.sk{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200%;animation:sk 1.3s ease-in-out infinite;border-radius:4px}

/* NEWS */
.news-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:8px 4px 6px;border-bottom:1px solid var(--divider);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.news-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:11px 13px;margin-bottom:7px;box-shadow:var(--shadow);cursor:pointer;transition:background .1s}
.news-card:active{background:var(--surface2)}
.nc-top{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.nc-tag{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--primary-bg);color:var(--primary)}
.nc-sector-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--blue-bg);color:var(--blue)}
.nc-sent{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-left:auto}
.nc-title{font-size:12px;font-weight:600;line-height:1.5;color:var(--text)}
.nc-meta{font-size:10px;color:var(--muted);margin-top:4px;display:flex;gap:8px;align-items:center}
.nc-impact{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px}
.impact-high{background:var(--red-bg);color:var(--red)}
.impact-med{background:var(--gold-bg);color:var(--gold)}
.impact-low{background:var(--green-bg);color:var(--green)}
.news-loading{padding:24px;text-align:center;color:var(--muted);font-size:12px}

/* WATCHLIST */
.watch-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow)}
.wc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.wc-left .wc-sym{font-family:var(--mono);font-size:14px;font-weight:700}
.wc-left .wc-name{font-size:10px;color:var(--muted);margin-top:1px}
.wc-right{text-align:right}
.wc-price{font-family:var(--mono);font-size:15px;font-weight:700}
.wc-chg{font-size:10px;font-weight:600;margin-top:2px}
.wc-note{font-size:11px;color:var(--muted);line-height:1.5;padding:7px 9px;background:var(--surface2);border-radius:8px}

/* SETTINGS DRAWER */
.s-fab{position:fixed;bottom:22px;right:16px;z-index:150;width:50px;height:50px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,.35);transition:transform .15s}
.s-fab:active{transform:scale(.9)}
.s-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:160;display:none}
.s-overlay.show{display:block}
.s-drawer{position:fixed;right:0;top:0;bottom:0;z-index:170;width:min(380px,100vw);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.16,1,.3,1);box-shadow:-8px 0 32px rgba(0,0,0,.3)}
.s-drawer.show{transform:translateX(0)}
.s-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.s-head h2{font-size:15px;font-weight:700}
.s-close{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--surface2);color:var(--muted);font-size:16px}
.s-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.s-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px}
.s-tab{flex:1;padding:9px;font-size:12px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;text-align:center}
.s-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.s-panel{display:none}.s-panel.active{display:block}
.s-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.s-card{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:11px;margin-bottom:8px}
.s-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:7px}
.s-field{display:flex;flex-direction:column;gap:4px}
.s-field label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.s-field input{padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-family:var(--mono);font-size:13px;min-height:38px;color:var(--text);width:100%}
.s-field input:focus{outline:2px solid var(--primary);outline-offset:1px}
.s-actions{display:flex;gap:6px}
.s-save{flex:1;padding:9px;border-radius:8px;background:var(--primary);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;transition:opacity .15s}
.s-save:active{opacity:.8}
.s-del{width:38px;height:38px;border-radius:8px;background:var(--red-bg);color:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.s-add-card{border:2px dashed var(--border);border-radius:11px;padding:12px;margin-bottom:8px}
.s-add-title{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text)}
.s-add-btn{width:100%;padding:10px;border-radius:8px;background:var(--primary);color:#fff;font-size:13px;font-weight:700;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:6px}
.s-reset{width:100%;padding:9px;border-radius:8px;border:1px solid var(--border);font-size:12px;color:var(--muted);font-weight:600;margin-top:4px}
.s-divider{height:1px;background:var(--divider);margin:14px 0}

/* DETAIL MODAL */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end}
.modal-back.show{display:flex}
.detail-sheet{width:100%;background:var(--surface);border-radius:16px 16px 0 0;max-height:80dvh;overflow-y:auto;padding:16px 18px 32px;padding-bottom:calc(32px + env(safe-area-inset-bottom,0))}
.sheet-handle{width:36px;height:4px;border-radius:999px;background:var(--border);margin:0 auto 14px}
.sheet-sym{font-family:var(--mono);font-size:20px;font-weight:700;margin-bottom:2px}
.sheet-name{font-size:12px;color:var(--muted);margin-bottom:14px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.d-box{background:var(--surface2);border-radius:9px;padding:10px 12px}
.d-box-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:3px}
.d-box-val{font-family:var(--mono);font-size:14px;font-weight:700}
.strat-box{background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:7px}
.strat-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.strat-val{font-size:13px;font-weight:600;line-height:1.5}
.sheet-close{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);font-size:14px;font-weight:600;margin-top:10px;color:var(--muted)}

/* INSTALL BANNER */
.install-banner{position:fixed;bottom:0;left:0;right:0;z-index:140;padding:12px 16px;background:var(--surface);border-top:1px solid var(--border);display:none;align-items:center;gap:10px;box-shadow:0 -4px 16px rgba(0,0,0,.2)}
.install-banner.show{display:flex}
.install-icon{width:36px;height:36px;border-radius:8px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.install-text{flex:1}
.install-text strong{font-size:13px;display:block}
.install-text span{font-size:11px;color:var(--muted)}
.install-btn{padding:9px 14px;border-radius:8px;background:var(--primary);color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
.install-dismiss{width:32px;height:32px;border-radius:50%;background:var(--surface2);color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}

/* TOAST */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-6px);background:var(--text);color:var(--surface);font-size:12px;font-weight:700;padding:9px 18px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:600;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── CHARTS ── */
.chart-section{margin-bottom:18px}
.chart-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:8px 4px 10px;display:flex;align-items:center;gap:6px}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow)}
.donut-wrap{position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.donut-center{position:absolute;text-align:center;pointer-events:none}
.donut-center-val{font-family:var(--mono);font-size:16px;font-weight:700}
.donut-center-lbl{font-size:10px;color:var(--muted);margin-top:1px}
.legend-list{display:flex;flex-direction:column;gap:6px}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.legend-sym{font-family:var(--mono);font-size:11px;font-weight:700;min-width:38px}
.legend-bar-wrap{flex:1;background:var(--surface2);border-radius:999px;height:6px;overflow:hidden}
.legend-bar{height:100%;border-radius:999px;transition:width .6s ease}
.legend-pct{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:36px;text-align:right}
.legend-val{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:52px;text-align:right}
.bar-chart-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-sym{font-family:var(--mono);font-size:11px;font-weight:700;min-width:40px}
.bar-wrap{flex:1;background:var(--surface2);border-radius:999px;height:20px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:999px;transition:width .6s ease;position:relative}
.bar-label{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:10px;font-weight:700;color:#fff;white-space:nowrap}
.bar-label-out{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:60px;text-align:right}
.pnl-chart-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.pnl-sym{font-family:var(--mono);font-size:11px;font-weight:700;min-width:40px}
.pnl-bar-outer{flex:1;position:relative;height:22px;display:flex;align-items:center}
.pnl-zero{position:absolute;top:0;bottom:0;width:2px;background:var(--border);z-index:1}
.pnl-bar-inner{position:absolute;height:16px;border-radius:0 6px 6px 0;transition:width .6s ease}
.pnl-bar-neg{border-radius:6px 0 0 6px}
.pnl-val{font-family:var(--mono);font-size:10px;min-width:64px;text-align:right;font-weight:600}
.chart-empty{padding:24px;text-align:center;color:var(--muted);font-size:12px}


/* ── TRADE LOG ── */
.trade-form{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.trade-form-title{font-size:13px;font-weight:700;margin-bottom:10px}
.trade-type-row{display:flex;gap:6px;margin-bottom:10px}
.trade-type-btn{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:700;border:1px solid var(--border);background:var(--surface2);color:var(--muted);transition:all .15s}
.trade-type-btn.buy.active{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.trade-type-btn.sell.active{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.trade-submit{width:100%;padding:10px;border-radius:8px;background:var(--primary);color:#fff;font-size:13px;font-weight:700;margin-top:8px}
.trade-log-list{display:flex;flex-direction:column;gap:7px}
.trade-item{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:11px 13px;box-shadow:var(--shadow)}
.ti-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.ti-left{display:flex;align-items:center;gap:7px}
.ti-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.ti-type.buy{background:var(--green-bg);color:var(--green)}
.ti-type.sell{background:var(--red-bg);color:var(--red)}
.ti-sym{font-family:var(--mono);font-size:13px;font-weight:700}
.ti-date{font-size:10px;color:var(--muted)}
.ti-price{font-family:var(--mono);font-size:13px;font-weight:700}
.ti-detail{display:flex;gap:12px;font-size:11px;color:var(--muted)}
.ti-del{color:var(--red);font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--red-bg)}
.trade-empty{padding:24px;text-align:center;color:var(--muted);font-size:12px}
.trade-summary{background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.ts-cell{text-align:center}
.ts-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}

  RDDT:{ rec:'hold', trigger:'$160-165',   stop:'$150', note:'用戶增長強勁，廣告收入加速，估值偏高宜小注持有。' },

const SECTORS = [

  { name:'美股大盤',        query:'S&P 500 stock market rally',         impact:'high', tickers:['VOO','VT'] },

  { name:'美聯儲與利率',    query:'Federal Reserve interest rate 2026',  impact:'high', tickers:['VOO','VT','AAPL'] },

];

// ── LIVE STATE ──
let HOLDINGS = JSON.parse(JSON.stringify(DEFAULT_HOLDINGS));
let WATCH     = JSON.parse(JSON.stringify(DEFAULT_WATCH));
let WATCH_NOTES = Object.assign({}, DEFAULT_WATCH_NOTES);
let cache = {};

// ══════════════════════════════════════════
//  LOCALSTORAGE
// ══════════════════════════════════════════
const LSK = { h:'pwa_h_v3', w:'pwa_w_v3', n:'pwa_n_v3' };
function saveLS() {

  localStorage.setItem(LSK.w, JSON.stringify(WATCH));

// ══════════════════════════════════════════
//  THEME
// ══════════════════════════════════════════
let dark = true;
document.getElementById('theme-btn').addEventListener('click', () => {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('theme-icon').innerHTML = dark
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
});

// ══════════════════════════════════════════
//  CLOCK & MARKET STATUS
// ══════════════════════════════════════════
function updateClock() {
  const hkt = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Hong_Kong'}));
  const et  = new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  document.getElementById('clk').textContent =
    hkt.toLocaleTimeString('en-HK',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const d=et.getDay(),m=et.getHours()*60+et.getMinutes();
  const open=d>=1&&d<=5&&m>=570&&m<960;
  const el=document.getElementById('mkt');
  el.textContent=open?'開市中':'休市';
  el.className='pill '+(open?'pill-open':'pill-closed');
}
setInterval(updateClock,1000); updateClock();

// ══════════════════════════════════════════
//  FETCH STOCK PRICE
// ══════════════════════════════════════════
const PROXY = 'https://corsproxy.io/?';
let fundCache = {};
const FINNHUB_KEY = 'd911e61r01qsei6m7i50d911e61r01qsei6m7i5g';
const FINNHUB = 'https://finnhub.io/api/v1';

async function fetchPrice(t) {
  const proxies = ['https://corsproxy.io/?','https://api.allorigins.win/raw?url='];
  for (const px of proxies) {
    try {
      const url = 'https://query1.finance.yahoo.com/v8/finance/chart/'+t+'?interval=1d&range=1y';
      const r = await fetch(px + encodeURIComponent(url), {cache:'no-store'});
      if (!r.ok) continue;
      const j = await r.json();
      const m = j.chart.result[0].meta;
      const closes = j.chart.result[0].indicators?.quote?.[0]?.close?.filter(x=>x!=null) || [];
      const p    = m.regularMarketPrice || m.previousClose;
      const prev = m.previousClose || p;
      const hi52 = closes.length ? Math.max(...closes) : null;
      const lo52 = closes.length ? Math.min(...closes) : null;
      return { p, ch:p-prev, pct:((p-prev)/prev)*100, hi52, lo52 };
    } catch { continue; }
  }
  return null;
}

async function fetchFundamentals(ticker) {
  try {
    // Fetch all 3 Finnhub endpoints in parallel — no proxy needed
    const [metricRes, targetRes, recRes, profileRes] = await Promise.allSettled([
      fetch(FINNHUB+'/stock/metric?symbol='+ticker+'&metric=all&token='+FINNHUB_KEY),
      fetch(FINNHUB+'/stock/price-target?symbol='+ticker+'&token='+FINNHUB_KEY),
      fetch(FINNHUB+'/stock/recommendation?symbol='+ticker+'&token='+FINNHUB_KEY),
      fetch(FINNHUB+'/stock/profile2?symbol='+ticker+'&token='+FINNHUB_KEY),
    ]);

    const metric  = metricRes.status==='fulfilled'  ? await metricRes.value.json()  : {};
    const target  = targetRes.status==='fulfilled'  ? await targetRes.value.json()  : {};
    const rec     = recRes.status==='fulfilled'     ? await recRes.value.json()     : [];
    const profile = profileRes.status==='fulfilled' ? await profileRes.value.json() : {};

    const m = metric.metric || {};
    const latestRec = Array.isArray(rec) && rec.length ? rec[0] : {};

    // Map Finnhub fields to our display shape
    return {
      marketCap:       profile.marketCapitalization ? profile.marketCapitalization*1e6 : null,
      trailingPE:      m.peBasicExclExtraTTM || m.peTTM || null,
      forwardPE:       m.peForwardAnnual || m.peForward || null,
      priceToBook:     m.pbAnnual || m.pb || null,
      epsTrailingTwelveMonths: m.epsBasicExclExtraItemsTTM || m.epsTTM || null,
      epsForward:      m.epsForwardAnnual || null,
      dividendYield:   m.dividendYieldIndicatedAnnual ? m.dividendYieldIndicatedAnnual/100 : null,
      revenueGrowth:   m.revenueGrowthQuarterlyYoy ? m.revenueGrowthQuarterlyYoy/100 : null,
      targetMeanPrice: target.targetMean || null,
      targetHigh:      target.targetHigh || null,
      targetLow:       target.targetLow || null,
      numberOfAnalystOpinions: target.lastUpdated ? (latestRec.buy||0)+(latestRec.hold||0)+(latestRec.sell||0)+(latestRec.strongBuy||0)+(latestRec.strongSell||0) : null,
      recommendationKey: resolveRec(latestRec),
      hi52:            m['52WeekHigh'] || null,
      lo52:            m['52WeekLow']  || null,
      currentPrice:    null,
      _recRaw:         latestRec,
    };
  } catch(e) {
    console.warn('[Finnhub] error:', e.message);
    return null;
  }
}

function resolveRec(r) {
  if (!r || (!r.buy && !r.hold && !r.sell && !r.strongBuy && !r.strongSell)) return null;
  const sb=r.strongBuy||0, b=r.buy||0, h=r.hold||0, s=r.sell||0, ss=r.strongSell||0;
  const score=(sb*5+b*4+h*3+s*2+ss*1)/(sb+b+h+s+ss||1);
  if(score>=4.5) return 'strongBuy';
  if(score>=3.75) return 'buy';
  if(score>=2.75) return 'hold';
  if(score>=2.0) return 'sell';
  return 'strongSell';
}


function fmtMC(v){if(!v)return'—';if(v>=1e12)return'$'+(v/1e12).toFixed(2)+'T';if(v>=1e9)return'$'+(v/1e9).toFixed(2)+'B';return'$'+(v/1e6).toFixed(0)+'M';}
function fmtP(v,d=2){return v!=null?'$'+v.toFixed(d):'—';}
function fmtN(v,d=2){return v!=null?v.toFixed(d):'—';}
function fmtPct(v){return v!=null?(v*100).toFixed(2)+'%':'—';}
function recLbl(k){return{strongBuy:'強烈買入',buy:'買入',hold:'持有',sell:'賣出',strongSell:'強烈賣出'}[k]||k||'—';}
function recCol(k){if(!k)return'var(--muted)';if(k.includes('buy')||k.includes('Buy'))return'var(--green)';if(k.includes('sell')||k.includes('Sell'))return'var(--red)';return'var(--gold)';}

function openDetail(i) {
  const h=HOLDINGS[i]; const d=cache[h.ticker];
  const s=STRATS[h.ticker]||{rec:'hold',trigger:'—',stop:'—',note:'—'};
  const cost=h.shares*h.cost;
  document.getElementById('d-sym').textContent=h.ticker;
  document.getElementById('d-name').textContent=h.name;
  let rows='<div class="d-box"><div class="d-box-label">股數</div><div class="d-box-val">'+h.shares+'</div></div>'

    +'<div class="d-box"><div class="d-box-label">總成本</div><div class="d-box-val">$'+cost.toFixed(2)+'</div></div>';
  if(d){

if('serviceWorker' in navigator){
  const swCode=`
const CACHE='portfolio-v4';
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll([location.pathname])));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{
  if(e.request.url.includes('corsproxy')||e.request.url.includes('yahoo')||e.request.url.includes('google.com/rss')){
    e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
  } else {
    e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
  }
});`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:location.pathname})
    .catch(()=>{});
}

// ══════════════════════════════════════════
const LSK_TRADES = 'pwa_trades_v1';
let TRADES = [];
let tradeType = 'buy';

function loadTrades() {
  try { const t=localStorage.getItem(LSK_TRADES); if(t) TRADES=JSON.parse(t); } catch{}
  // Set today as default date
  const d=new Date().toISOString().split('T')[0];
  const el=document.getElementById('tr-date');
  if(el) el.value=d;
}
function saveTrades() { localStorage.setItem(LSK_TRADES, JSON.stringify(TRADES)); }

function setTradeType(t) {
  tradeType=t;
  document.getElementById('tr-buy-btn').classList.toggle('active', t==='buy');
  document.getElementById('tr-sell-btn').classList.toggle('active', t==='sell');
}

function addTrade() {
  const ticker=(document.getElementById('tr-ticker').value||'').trim().toUpperCase();
  const date=document.getElementById('tr-date').value;
  const shares=parseFloat(document.getElementById('tr-shares').value);
  const price=parseFloat(document.getElementById('tr-price').value);
  const note=(document.getElementById('tr-note').value||'').trim();
  if(!ticker||!date||isNaN(shares)||isNaN(price)||shares<=0||price<=0){toast('請填寫代號、日期、股數及價格');return;}
  TRADES.unshift({ id:Date.now(), type:tradeType, ticker, date, shares, price, note, total:shares*price });
  saveTrades();
  ['tr-ticker','tr-shares','tr-price','tr-note'].forEach(id=>document.getElementById(id).value='');
  renderTrades();
  toast((tradeType==='buy'?'✓ 已記錄買入 ':'✓ 已記錄賣出 ')+ticker);
}

function deleteTrade(id) {
  TRADES=TRADES.filter(t=>t.id!==id);
  saveTrades(); renderTrades();
  toast('已刪除交易記錄');
}

function renderTrades() {
  // Summary
  const buys=TRADES.filter(t=>t.type==='buy');
  const sells=TRADES.filter(t=>t.type==='sell');
  const totalBuy=buys.reduce((s,t)=>s+t.total,0);
  const totalSell=sells.reduce((s,t)=>s+t.total,0);
  const realised=totalSell-buys.filter(b=>sells.some(s=>s.ticker===b.ticker)).reduce((s,t)=>s+t.total,0);
  const sr=document.getElementById('trade-summary-row');
  if(TRADES.length>0){
    sr.innerHTML=`<div class="trade-summary">
      <div class="ts-cell"><div class="ts-label">買入總額</div><div class="ts-val" style="color:var(--green)">$${totalBuy>=1000?(totalBuy/1000).toFixed(2)+'K':totalBuy.toFixed(0)}</div></div>
      <div class="ts-cell"><div class="ts-label">賣出總額</div><div class="ts-val" style="color:var(--red)">$${totalSell>=1000?(totalSell/1000).toFixed(2)+'K':totalSell.toFixed(0)}</div></div>
      <div class="ts-cell"><div class="ts-label">交易次數</div><div class="ts-val">${TRADES.length}</div></div>
    </div>`;
  } else { sr.innerHTML=''; }

  // Log
  const el=document.getElementById('trade-log');
  if(!TRADES.length){el.innerHTML='<div class="trade-empty">📋 暫無交易記錄<br><span style="font-size:11px">上方填寫後按「記錄交易」即可加入</span></div>';return;}
  el.innerHTML=TRADES.map(t=>{
    const d=new Date(t.date).toLocaleDateString('zh-HK',{year:'numeric',month:'short',day:'numeric'});
    const curPrice=cache[t.ticker]?.p;
    let pnlHtml='';
    if(curPrice&&t.type==='buy'){
      const pnl=(curPrice-t.price)*t.shares;
      const pct=((curPrice-t.price)/t.price)*100;
      const col=pnl>=0?'var(--green)':'var(--red)';
      pnlHtml=`<span style="color:${col};font-weight:600">${pnl>=0?'+$':'-$'}${Math.abs(pnl).toFixed(0)} (${pct>=0?'+':''}${pct.toFixed(1)}%)</span>`;
    }
    return `<div class="trade-item">
      <div class="ti-top">
        <div class="ti-left">
          <span class="ti-type ${t.type}">${t.type==='buy'?'買入':'賣出'}</span>
          <span class="ti-sym">${t.ticker}</span>
        </div>
        <button class="ti-del" onclick="deleteTrade(${t.id})">刪除</button>
      </div>
      <div class="ti-detail">
        <span>${t.shares} 股 @ $${t.price.toFixed(2)}</span>
        <span>總額 $${t.total.toFixed(0)}</span>
        <span>${d}</span>
      </div>
      ${pnlHtml?`<div style="margin-top:5px;font-size:11px">${pnlHtml} 浮動盈虧</div>`:''}
      ${t.note?`<div style="margin-top:4px;font-size:11px;color:var(--muted)">${t.note}</div>`:''}
    </div>`;
  }).join('');
}

const CHART_COLORS = [
  '#4f98a3','#5fa33a','#d4a835','#de6b73','#5893cc',
  '#a06fc0','#e8834a','#41b89c','#e85d9a','#8fb04d'

function renderCharts() {
  const c = document.getElementById('charts-container');
  const loaded = HOLDINGS.filter(h => cache[h.ticker]);
  if (!loaded.length) {
    c.innerHTML = '<div class="chart-empty">⏳ 請等待股價載入後再查看圖表</div>';
    return;
  }

  // ── Data prep ──
  const items = loaded.map((h,i) => {
    const d = cache[h.ticker];
    const cost = h.shares * h.cost;
    const val  = h.shares * d.p;
    const pnl  = val - cost;
    const pct  = (pnl / cost) * 100;
    return { ticker:h.ticker, name:h.name, cost, val, pnl, pct, color:CHART_COLORS[i%CHART_COLORS.length] };
  });

  const totalVal  = items.reduce((s,x)=>s+x.val, 0);
  const totalCost = items.reduce((s,x)=>s+x.cost, 0);
  const totalPnl  = totalVal - totalCost;
  const totalPct  = (totalPnl/totalCost)*100;

  // ── 1. Donut – Allocation ──
  const maxDonutVal = Math.max(...items.map(x=>x.val));
  const donutHtml = `
  <div class="chart-section">
    <div class="chart-title">🥧 持倉配置比例</div>
    <div class="chart-wrap">
      <div class="donut-wrap">
        <svg width="160" height="160" viewBox="0 0 160 160">
          ${(()=>{
            let angle = -Math.PI/2;
            return items.map(item=>{
              const pct = item.val/totalVal;
              const sweep = pct*2*Math.PI;
              const r=62,cx=80,cy=80,inner=36;
              const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
              const x2=cx+r*Math.cos(angle+sweep), y2=cy+r*Math.sin(angle+sweep);
              const xi1=cx+inner*Math.cos(angle+sweep), yi1=cy+inner*Math.sin(angle+sweep);
              const xi2=cx+inner*Math.cos(angle), yi2=cy+inner*Math.sin(angle);
              const lg=sweep>Math.PI?1:0;
              const path=`M${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${xi1},${yi1} A${inner},${inner} 0 ${lg},0 ${xi2},${yi2} Z`;
              angle+=sweep;
              return `<path d="${path}" fill="${item.color}" opacity=".9"/>`;
            }).join('');
          })()}
        </svg>
        <div class="donut-center">
          <div class="donut-center-val" style="color:${totalPnl>=0?'var(--green)':'var(--red)'}">${totalPnl>=0?'+':''}$${Math.abs(totalPnl)<1000?Math.abs(totalPnl).toFixed(0):(Math.abs(totalPnl)/1000).toFixed(2)+'K'}</div>
          <div class="donut-center-lbl">總盈虧</div>
        </div>
      </div>
      <div class="legend-list">
        ${items.map(item=>`
          <div class="legend-item">
            <div class="legend-dot" style="background:${item.color}"></div>
            <div class="legend-sym">${item.ticker}</div>
            <div class="legend-bar-wrap"><div class="legend-bar" style="width:${(item.val/totalVal*100).toFixed(1)}%;background:${item.color}"></div></div>
            <div class="legend-pct">${(item.val/totalVal*100).toFixed(1)}%</div>
            <div class="legend-val">$${item.val<1000?item.val.toFixed(0):(item.val/1000).toFixed(2)+'K'}</div>
          </div>`).join('')}
      </div>
    </div>
  </div>`;

  // ── 2. Bar – Market Value ──
  const sortedVal = [...items].sort((a,b)=>b.val-a.val);
  const barHtml = `
  <div class="chart-section">
    <div class="chart-title">📊 各股市值排行</div>
    <div class="chart-wrap">
      ${sortedVal.map(item=>{
        const w = (item.val/sortedVal[0].val*100).toFixed(1);
        const valStr = item.val<1000?'$'+item.val.toFixed(0):'$'+(item.val/1000).toFixed(2)+'K';
        return `<div class="bar-chart-row">
          <div class="bar-sym">${item.ticker}</div>
          <div class="bar-wrap">
            <div class="bar-fill" style="width:${w}%;background:${item.color}">
              <span class="bar-label">${valStr}</span>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  // ── 3. PnL Bar – diverging ──
  const sortedPnl = [...items].sort((a,b)=>b.pct-a.pct);
  const maxAbsPct = Math.max(...sortedPnl.map(x=>Math.abs(x.pct)));
  const pnlHtml = `
  <div class="chart-section">
    <div class="chart-title">💹 各股盈虧百分比</div>
    <div class="chart-wrap">
      ${sortedPnl.map(item=>{
        const barW = (Math.abs(item.pct)/maxAbsPct*45).toFixed(1);
        const isPos = item.pct >= 0;
        const col = isPos ? 'var(--green)' : 'var(--red)';
        const pctStr = (item.pct>=0?'+':'')+item.pct.toFixed(2)+'%';
        const pnlStr = (item.pnl>=0?'+$':'-$')+Math.abs(item.pnl).toFixed(0);
        return `<div class="pnl-chart-row">
          <div class="pnl-sym">${item.ticker}</div>
          <div class="pnl-bar-outer">
            <div class="pnl-zero" style="left:50%"></div>
            ${isPos
              ? `<div class="pnl-bar-inner" style="left:50%;width:${barW}%;background:${col}"></div>`
              : `<div class="pnl-bar-inner pnl-bar-neg" style="right:50%;width:${barW}%;background:${col}"></div>`}
          </div>
          <div class="pnl-val" style="color:${col}">${pctStr}</div>
          <div class="pnl-val" style="color:${col};min-width:58px">${pnlStr}</div>
        </div>`;
      }).join('')}
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--divider);display:flex;justify-content:space-between;font-size:11px">
        <span style="color:var(--muted)">總成本 $${(totalCost/1000).toFixed(2)}K</span>
        <span style="color:${totalPnl>=0?'var(--green)':'var(--red)'}">總回報 ${totalPct>=0?'+':''}${totalPct.toFixed(2)}%</span>
        <span style="color:${totalPnl>=0?'var(--green)':'var(--red)'}">盈虧 ${totalPnl>=0?'+$':'-$'}${Math.abs(totalPnl).toFixed(0)}</span>
      </div>
    </div>
  </div>`;

  // ── 4. Cost vs Value comparison ──
  const cvHtml = `
  <div class="chart-section">
    <div class="chart-title">⚖️ 成本 vs 現值對比</div>
    <div class="chart-wrap">
      ${items.map(item=>{
        const maxV = Math.max(item.cost, item.val);
        const costW = (item.cost/maxV*100).toFixed(1);
        const valW  = (item.val/maxV*100).toFixed(1);
        const isPos = item.val >= item.cost;
        return `<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px">
            <span style="font-family:var(--mono);font-size:11px;font-weight:700">${item.ticker}</span>
            <span style="font-size:10px;color:var(--muted)">${item.name}</span>
          </div>
          <div style="display:flex;gap:4px;margin-bottom:2px;align-items:center">
            <span style="font-size:9px;color:var(--muted);min-width:28px">成本</span>
            <div style="flex:1;background:var(--surface2);border-radius:999px;height:8px;overflow:hidden">
              <div style="width:${costW}%;height:100%;background:var(--faint);border-radius:999px"></div>
            </div>
            <span style="font-family:var(--mono);font-size:10px;color:var(--muted);min-width:52px;text-align:right">$${item.cost.toFixed(0)}</span>
          </div>
          <div style="display:flex;gap:4px;align-items:center">
            <span style="font-size:9px;color:var(--muted);min-width:28px">現值</span>
            <div style="flex:1;background:var(--surface2);border-radius:999px;height:8px;overflow:hidden">
              <div style="width:${valW}%;height:100%;background:${isPos?'var(--green)':'var(--red)'};border-radius:999px"></div>
            </div>
            <span style="font-family:var(--mono);font-size:10px;color:${isPos?'var(--green)':'var(--red)'};min-width:52px;text-align:right">$${item.val.toFixed(0)}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  c.innerHTML = donutHtml + barHtml + pnlHtml + cvHtml;
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
loadLS();
loadTrades();
renderPrices(true);
renderWatch();
doRefresh();
setInterval(doRefresh, 60000);
setInterval(()=>{newsLoaded={holdings:false,sector:false};}, 600000);
</script>
</body>
